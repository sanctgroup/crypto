[graph]
all-features = true

[advisories]
yanked = "warn"
ignore = [
    # Marvin Attack timing sidechannel in `rsa` 0.9.x. Pulled in transitively by
    # the `pgp` crate. No upstream fix available; mitigation is to avoid using
    # RSA in network-observable timing contexts (we use it only locally).
    "RUSTSEC-2023-0071",
    # `paste` is unmaintained. Pulled in transitively by uniffi 0.28.
    "RUSTSEC-2024-0436",
    # `bincode 1.x` unmaintained (development ceased upstream). Pulled in by
    # uniffi_macros 0.28.
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9
exceptions = []

[bans]
multiple-versions = "allow"
wildcards = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
